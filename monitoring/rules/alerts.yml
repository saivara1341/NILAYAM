groups:
  - name: nilayam_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High API Error Rate (> 5 errors/min) for 1 min"
          description: "Target {{ $labels.instance }} is showing a high error rate."

      - alert: SlowAPIRequests
        expr: histogram_quantile(0.99, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API 99th percentile latency is greater than 2s"
          description: "API is experiencing slow response times."

      - alert: ContainerDown
        expr: absent(container_last_seen{name="backend"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend Container is Down"
          description: "No metrics received from the backend container for 1 minute."

      - alert: HostOutOfMemory
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Host memory is critical (less than 10% available)"
          description: "Node memory is almost exhausted."
