# ── Default Virtual Host Conf

# ── Upstream definition (Backend Spring Boot API)
upstream backend_api {
    server backend:8080;
}

# ── Redirect HTTP -> HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    
    # Allow Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name nilayam.in www.nilayam.in;

    # ── TLS Configuration (A+ Rating on SSL Labs)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # Modern compatibility
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # Optimize SSL cache
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;  # about 40000 sessions
    ssl_session_tickets off;

    # ── Diffie-Hellman Parameter
    ssl_dhparam /etc/nginx/ssl-dhparams.pem;

    # ── OWASP Security Headers (Defense in Depth)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), midi=(), sync-xhr=(), microphone=(), camera=(), magnetometer=(), gyroscope=(), fullscreen=(self), payment=()";
    
    # Note: Define CSP based on actual third parties (Razorpay, Supabase, Google Fonts)
    # add_header Content-Security-Policy ...

    root /usr/share/nginx/html;
    index index.html;

    # ── Frontend SPA Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset aggressive caching
    location ~* \.(?:css|js|map|jpe?g|gif|png|ico|woff2?|eot|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── API Reverse Proxy (to Spring Boot Backend)
    location /api/ {
        proxy_pass http://backend_api;
        
        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Proxy timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Rate Limiting
        limit_req zone=api_limit burst=20 nodelay;
    }

    # ── Authentication Strict Rate Limiting
    location /api/auth/ {
        proxy_pass http://backend_api;
        limit_req zone=auth_limit burst=5 nodelay;
    }

    # ── Health checks
    location /health {
        access_log off;
        return 200 '{"status":"UP"}';
        add_header Content-Type application/json;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
