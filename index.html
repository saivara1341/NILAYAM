<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="origin" />
  <link rel="icon" type="image/svg+xml" href="%BASE_URL%home.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nilayam" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-touch-fullscreen" content="yes" />
  
  <!-- Apple Splash Screens -->
  <link rel="apple-touch-icon" href="%BASE_URL%pwa-192x192.png" />
  <link rel="apple-touch-startup-image" href="%BASE_URL%pwa-512x512.png" />
  
  <meta name="description" content="Intelligent property management platform for modern owners and tenants." />
  <link rel="manifest" href="%BASE_URL%manifest.json" />
  <title>Nilayam | Modern Property Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Righteous&family=Noto+Sans+Telugu:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Sans+Tamil:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&family=Noto+Sans+Kannada:wght@400;500;600;700&family=Noto+Sans+Malayalam:wght@400;500;600;700&family=Noto+Sans+Gujarati:wght@400;500;600;700&family=Noto+Sans+Gurmukhi:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Noto Sans Telugu', 'Noto Sans Devanagari', 'Noto Sans Tamil', 'Noto Sans Bengali', 'Noto Sans Kannada', 'Noto Sans Malayalam', 'Noto Sans Gujarati', 'Noto Sans Gurmukhi', 'sans-serif'],
            righteous: ['Righteous', 'cursive'],
          },
          colors: {
            primary: {
              DEFAULT: 'var(--primary-color)',
              light: 'var(--primary-light)',
              dark: 'var(--primary-dark)',
            },
            secondary: 'var(--secondary-color)',
            accent: 'var(--accent-color)',
            neutral: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              900: '#0f172a',
              950: '#020617',
            },
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --primary-color: #6366f1; /* Indigo 500 */
      --primary-light: #818cf8;
      --primary-dark: #4f46e5;
      --secondary-color: #0f172a;
      --accent-color: #f59e0b; /* Amber 500 */
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-blur: blur(12px);
      -webkit-tap-highlight-color: transparent;
      --sat: env(safe-area-inset-top);
      --sar: env(safe-area-inset-right);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
    }

    body {
      background-color: #f8fafc;
      background-image: radial-gradient(circle at top right, rgba(238, 242, 255, 0.8), rgba(248, 250, 252, 0.9)), url("https://www.transparenttextures.com/patterns/arabesque.png");
      color: #0f172a;
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
      margin: 0;
      min-height: 100vh;
      transition: background-color 0.3s ease;
    }

    /* Dark Mode Overrides */
    .dark body {
      background-color: #0a0a0a;
      background-image: radial-gradient(circle at top right, rgba(30, 27, 75, 0.8), rgba(10, 10, 10, 0.9)), url("https://www.transparenttextures.com/patterns/arabesque.png");
      color: #f1f5f9;
    }

    /* Premium Scrollbar - HIDDEN */
    ::-webkit-scrollbar { display: none; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { 
      background: transparent;
    }

    /* Glass Panels */
    .glass-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 1rem;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
    }
    .dark .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .glass-nav {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }
    .dark .glass-nav {
      background: rgba(10, 10, 10, 0.8);
      border-bottom: 1px solid var(--glass-border);
    }

    /* Forms */
    .form-input {
      background: rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(0, 0, 0, 0.1);
      color: #0f172a;
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .form-input::placeholder {
      color: #94a3b8;
    }
    .dark .form-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: #fff;
    }
    .dark .form-input::placeholder {
      color: #64748b;
    }

    .form-input:focus {
      outline: none;
      background: rgba(0, 0, 0, 0.05);
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }
    .dark .form-input:focus {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
    }

    /* Buttons */
    .btn-premium {
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      color: white;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
      cursor: pointer;
    }

    .btn-premium:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
    }

    /* Animations */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    @keyframes brandPulse {
      0%, 100% { opacity: 0.8; transform: scale(1); filter: blur(0px); }
      50% { opacity: 1; transform: scale(1.02); filter: blur(1px); }
    }

    @keyframes shimmer {
      0% { transform: translateX(-150%) scaleX(0.5); opacity: 0; }
      50% { transform: translateX(0%) scaleX(1); opacity: 1; }
      100% { transform: translateX(150%) scaleX(0.5); opacity: 0; }
    }

    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    .animate-brand-pulse {
      animation: brandPulse 4s ease-in-out infinite;
    }

    .animate-shimmer {
      animation: shimmer 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    /* Mobile Safe Areas */
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom);
    }
    .pt-safe {
      padding-top: env(safe-area-inset-top);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
