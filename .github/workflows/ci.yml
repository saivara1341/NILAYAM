name: Continuous Integration

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type Check (TypeScript)
      run: npx tsc --noEmit

    - name: Lint
      run: npx eslint src --ext .ts,.tsx
      continue-on-error: true # Warning only for now

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run E2E Tests
      run: npx playwright test
      env:
        # Mock env vars for CI testing
        VITE_SUPABASE_URL: "http://localhost:54321"
        VITE_SUPABASE_ANON_KEY: "mock_key"
        GEMINI_API_KEY: "mock_key"
      
    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

    - name: Test Frontend Docker Build
      run: docker build --target builder -t nilayam-frontend:test .

    - name: Test Backend Docker Build
      run: docker build -f Dockerfile.backend -t nilayam-backend:test .
